; PlatformIO Project Configuration File
; Hexapod ESP32 Display — XIAO ESP32-C3 + SH1122 256x64 OLED

[platformio]
default_envs = xiao_c3
src_dir = src
include_dir = include
lib_dir = lib
test_dir = test

[env]
build_flags =
    -D FW_VERSION_MAJOR=0
    -D FW_VERSION_MINOR=1
    -D FW_VERSION_PATCH=0

[env:xiao_c3]
platform = espressif32@^6.7.0
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1
lib_deps =
    olikraus/U8g2 @ ^2.35.30

[env:native]
platform = native
build_flags =
    -std=gnu++17
    -I include
    -I lib/ProtocolCodec
test_framework = unity
test_filter = test_codec test_crc
